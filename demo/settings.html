<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Settings — Lumen</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system, system-ui, sans-serif; background:#fff; color:#1a1a1a; }
  .wrap { max-width:640px; margin:56px auto; padding:0 32px; }
  h1 { font-size:26px; font-weight:600; margin-bottom:28px; }
  .row { display:flex; align-items:flex-start; }
  .row .meta { margin-right:auto; }
  .row .title { font-size:15px; font-weight:600; }
  .row .help { font-size:12px; color:#bcbcbc; margin-top:3px; }
  /* tiny toggle, faint */
  .toggle { width:34px; height:16px; border:1px solid #ececec; border-radius:999px; position:relative; flex:none; margin-top:4px; }
  .toggle::after { content:""; position:absolute; top:1px; left:1px; width:12px; height:12px; border-radius:50%; background:#dcdcdc; }
  /* UNEVEN vertical rhythm — ambiguous grouping (proximity) */
  .r1 { margin-bottom:10px; }
  .r2 { margin-bottom:58px; }
  .r3 { margin-bottom:10px; }
  .r4 { margin-bottom:58px; }
  .r5 { margin-bottom:10px; }
</style></head>
<body>
  <div class="wrap">
    <h1>Settings</h1>
    <div class="row r1"><div class="meta"><div class="title">Email notifications</div>
      <div class="help">Send a digest of activity to your inbox</div></div><a class="toggle" href="#"></a></div>
    <div class="row r2"><div class="meta"><div class="title">Desktop alerts</div>
      <div class="help">Show a banner when you're mentioned</div></div><a class="toggle" href="#"></a></div>
    <div class="row r3"><div class="meta"><div class="title">Weekly summary</div>
      <div class="help">A Monday recap of last week</div></div><a class="toggle" href="#"></a></div>
    <div class="row r4"><div class="meta"><div class="title">Two-factor auth</div>
      <div class="help">Require a code at sign-in</div></div><a class="toggle" href="#"></a></div>
    <div class="row r5"><div class="meta"><div class="title">Public profile</div>
      <div class="help">Let teammates see your activity</div></div><a class="toggle" href="#"></a></div>
  </div>
</body></html>
