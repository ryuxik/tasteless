<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Lumen</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system, system-ui, sans-serif; background:#fafafa; color:#1a1a1a;
         display:flex; min-height:100vh; align-items:center; justify-content:center; }
  .card { width:380px; background:#fff; border:1px solid #e6e6e6; border-radius:16px; padding:40px 36px; }
  h1 { font-size:24px; font-weight:600; text-align:center; }
  .sub { text-align:center; color:#595959; font-size:14px; margin:6px 0 28px; }
  label { display:block; color:#333; font-size:14px; margin:0 0 6px; }
  input { width:100%; height:44px; border:1px solid #767676; border-radius:8px; padding:0 12px;
          font-size:15px; color:#1a1a1a; margin-bottom:18px; }
  input::placeholder { color:#767676; }
  .submit { display:block; width:100%; border:none; background:#1a1a1a; color:#fff;
            font-size:15px; padding:13px 0; border-radius:8px; cursor:pointer; }
  .row { display:flex; justify-content:flex-end; align-items:center; margin:-8px 0 18px; }
  .row a { color:#2f5fbf; font-size:14px; text-decoration:none; padding:8px 4px; }
  .alt { text-align:center; margin-top:22px; font-size:14px; color:#595959; }
  .alt a { color:#2f5fbf; }
</style></head>
<body>
  <form class="card">
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your Lumen workspace</p>
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@company.com">
    <label for="pw">Password</label>
    <input id="pw" type="password" placeholder="Your password">
    <div class="row"><a href="#">Forgot password?</a></div>
    <button class="submit">Sign in</button>
    <p class="alt">No account? <a href="#">Create one</a></p>
  </form>
</body></html>
