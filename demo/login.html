<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Lumen</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system, system-ui, sans-serif; background:#fafafa; color:#1a1a1a;
         display:flex; min-height:100vh; align-items:center; justify-content:center; }
  .card { width:380px; background:#fff; border:1px solid #eee; border-radius:16px; padding:40px 36px; }
  h1 { font-size:24px; font-weight:600; text-align:center; }
  .sub { text-align:center; color:#bcbcbc; font-size:13px; margin:6px 0 28px; }
  label { display:block; color:#bdbdbd; font-size:12px; margin:0 0 5px; }
  /* short, low-contrast inputs */
  input { width:100%; height:30px; border:1px solid #ececec; border-radius:7px; padding:0 10px;
          font-size:13px; color:#333; margin-bottom:16px; }
  input::placeholder { color:#cfcfcf; }
  /* ghost submit: faint border, gray text, short */
  .submit { display:block; width:100%; border:1px solid #ededed; background:#fff; color:#b6b6b6;
            font-size:13px; padding:6px 0; border-radius:8px; cursor:pointer; }
  .row { display:flex; justify-content:space-between; align-items:center; margin:-6px 0 18px; }
  .row a { color:#c6c6c6; font-size:12px; text-decoration:none; }
  .alt { text-align:center; margin-top:20px; font-size:12px; color:#c2c2c2; }
  .alt a { color:#bdbdbd; }
</style></head>
<body>
  <form class="card">
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your Lumen workspace</p>
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@company.com">
    <label for="pw">Password</label>
    <input id="pw" type="password" placeholder="••••••••">
    <div class="row"><span></span><a href="#">Forgot?</a></div>
    <button class="submit">Sign in</button>
    <p class="alt">No account? <a href="#">Create one</a></p>
  </form>
</body></html>
