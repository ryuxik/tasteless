<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlas — hierarchy demo (after)</title>
<!--
  Same content, same photo. The perceptual fix the salience loop drove:
    - the decorative photo is contained (not full-bleed) and calmed
      (desaturated + a scrim) so it stops hijacking the top fold;
    - the headline + CTA column is widened and weighted so the message leads.
  Re-measured with tasteless.measure: the share of visual pull on the right
  (the photo) drops, and the peak moves toward the content. Intent now matches.
-->
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system, system-ui, sans-serif; color:#16161a; background:#fff; }
  nav { display:flex; gap:20px; align-items:center; padding:22px 56px; }
  .word { font-weight:700; font-size:19px; margin-right:auto; }
  nav a { color:#3a3a3a; text-decoration:none; font-size:14px; padding:8px 6px; }
  .hero { display:flex; align-items:center; gap:56px; min-height:84vh; padding:64px 56px; }
  .copy { flex:1; }
  .eyebrow { font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:#6a6a6a; }
  h1 { font-size:62px; line-height:1.03; font-weight:800; letter-spacing:-.02em; margin:14px 0 18px; }
  .sub { font-size:19px; line-height:1.6; color:#444; max-width:46ch; }
  .cta { display:inline-block; margin-top:30px; background:#1a1a1a; color:#fff; font-size:16px;
         padding:15px 30px; border-radius:10px; text-decoration:none; }
  /* photo: contained, small, strongly calmed (desaturate + scrim) so it stops
     hijacking the fold — the perceptual fix the salience loop converged on */
  .art { flex:0 0 240px; position:relative; border-radius:16px; overflow:hidden; }
  .art img { width:240px; height:260px; object-fit:cover; display:block;
             filter:saturate(.28) contrast(.9) brightness(1.06); }
  .art::after { content:""; position:absolute; inset:0; background:rgba(255,255,255,.42); }
</style></head>
<body>
  <nav><span class="word">Atlas</span>
    <a href="#">Product</a><a href="#">Pricing</a><a href="#">Docs</a><a href="#">Start free trial</a>
  </nav>
  <section class="hero">
    <div class="copy">
      <div class="eyebrow">Field notebooks, reimagined</div>
      <h1>Capture the idea before it's gone.</h1>
      <p class="sub">Atlas turns the half-thought you have on a walk into something
         you'll actually find again. Quiet, fast, yours.</p>
      <a class="cta" href="#">Start free trial</a>
    </div>
    <div class="art"><img src="assets/hero.jpg" alt="A winding road through hills"></div>
  </section>
</body></html>
